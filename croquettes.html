<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐱 Croquettes</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,700;0,900;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0d0b;
  --surface: #1c1814;
  --surface2: #251f19;
  --border: rgba(255,220,150,0.1);
  --border2: rgba(255,220,150,0.2);
  --gold: #E8B86D;
  --gold-dim: rgba(232,184,109,0.15);
  --gold-mid: rgba(232,184,109,0.35);
  --orange: #E8613A;
  --orange-dim: rgba(232,97,58,0.15);
  --cream: #F5EDD8;
  --cream-dim: rgba(245,237,216,0.45);
  --sage: #7aab82;
  --sage-dim: rgba(122,171,130,0.15);
  --rose: #c96b8a;
  --text: #F5EDD8;
  --text-dim: rgba(245,237,216,0.4);
  --text-mid: rgba(245,237,216,0.65);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  position: relative;
  overflow-x: hidden;
}

/* grain overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.6;
}

/* ambient glow */
body::after {
  content: '';
  position: fixed;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,184,109,0.06) 0%, transparent 70%);
  top: -100px; left: 50%; transform: translateX(-50%);
  pointer-events: none; z-index: 0;
}

.app {
  max-width: 420px;
  margin: 0 auto;
  padding: 0 0 60px;
  position: relative; z-index: 1;
}

/* ========== HEADER ========== */
header {
  padding: 28px 20px 20px;
  text-align: center;
  position: relative;
}

.cat-icon {
  font-size: 2.8rem;
  display: block;
  margin-bottom: 8px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

h1 {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 1.9rem;
  letter-spacing: -0.03em;
  color: var(--gold);
  line-height: 1;
}

h1 small {
  display: block;
  font-size: 0.7rem;
  font-family: 'DM Mono', monospace;
  font-weight: 400;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 5px;
}

/* ========== DAY SELECTOR ========== */
.day-nav {
  padding: 0 20px;
  margin-bottom: 20px;
}

.day-nav-label {
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.day-tabs {
  display: flex;
  gap: 5px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 5px;
}

.day-tab {
  flex: 1;
  padding: 8px 4px 7px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  line-height: 1;
}

.day-tab .day-abbr {
  font-weight: 500;
  font-size: 0.72rem;
  letter-spacing: 0.04em;
}

.day-tab .day-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: transparent;
  transition: background 0.18s;
}

.day-tab.has-data .day-dot { background: var(--gold-mid); }
.day-tab.active .day-dot { background: var(--gold); }

.day-tab.active {
  background: var(--gold-dim);
  color: var(--gold);
  border: 1px solid var(--gold-mid);
}

.day-tab:not(.active):hover { color: var(--cream-dim); }

/* ========== MAIN CARD ========== */
.main-card {
  margin: 0 20px 16px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}

.card-header {
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-day {
  font-family: 'Fraunces', serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--cream);
}

.card-day span {
  color: var(--gold);
  font-style: italic;
}

/* Progress bar */
.progress-wrap {
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--border);
}

.progress-labels {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

.prog-total {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 2.6rem;
  color: var(--gold);
  line-height: 1;
  letter-spacing: -0.04em;
}

.prog-total span {
  font-size: 1rem;
  font-weight: 400;
  color: var(--text-dim);
  letter-spacing: 0;
}

.prog-target {
  font-size: 0.72rem;
  color: var(--text-dim);
  text-align: right;
  line-height: 1.4;
}

.progress-bar-track {
  height: 8px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 10px;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--gold), #f0c87a);
  transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1);
  max-width: 100%;
}

.progress-bar-fill.over { background: linear-gradient(90deg, var(--orange), #f4876a); }

/* Log entries */
.log-section {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  min-height: 60px;
}

.log-label {
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.log-list {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.log-pill {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--gold-dim);
  color: var(--gold);
  border: 1px solid var(--gold-mid);
  animation: pop-in 0.22s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes pop-in {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.log-empty {
  color: var(--text-dim);
  font-size: 0.75rem;
  font-style: italic;
}

/* Action buttons */
.actions {
  padding: 14px 16px 16px;
  display: flex;
  gap: 8px;
}

.btn-add {
  flex: 1;
  background: var(--gold-dim);
  border: 1px solid var(--gold-mid);
  color: var(--gold);
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 1rem;
  padding: 14px 8px;
  border-radius: 13px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  line-height: 1;
}

.btn-add:active { transform: scale(0.93); background: rgba(232,184,109,0.25); }

.btn-add .btn-g {
  font-size: 0.62rem;
  font-family: 'DM Mono', monospace;
  font-weight: 400;
  opacity: 0.7;
  letter-spacing: 0.05em;
}

.btn-undo {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text-mid);
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  padding: 14px 14px;
  border-radius: 13px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-undo:active { transform: scale(0.93); }
.btn-undo:disabled { opacity: 0.3; pointer-events: none; }

/* ========== WEEK OVERVIEW ========== */
.week-card {
  margin: 0 20px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
}

.week-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.week-title {
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.week-avg {
  font-size: 0.72rem;
  color: var(--text-mid);
}

.week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.week-bar-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.week-bar-track {
  width: 100%;
  height: 48px;
  background: var(--surface2);
  border-radius: 4px;
  display: flex;
  align-items: flex-end;
  overflow: hidden;
}

.week-bar-fill {
  width: 100%;
  border-radius: 4px;
  background: var(--gold-dim);
  border-top: 2px solid var(--gold-mid);
  transition: height 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

.week-bar-fill.active-day { background: var(--gold-dim); border-color: var(--gold); }
.week-bar-fill.today-day { background: rgba(122,171,130,0.15); border-color: var(--sage); }

.week-bar-label {
  font-size: 0.55rem;
  color: var(--text-dim);
  letter-spacing: 0.04em;
}

.week-bar-label.active-label { color: var(--gold); }

/* ========== RESET SECTION ========== */
.reset-card {
  margin: 0 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
}

.reset-header {
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.reset-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn-reset-day {
  flex: 1;
  background: var(--orange-dim);
  border: 1px solid rgba(232,97,58,0.3);
  color: var(--orange);
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  padding: 11px 12px;
  border-radius: 11px;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
}

.btn-reset-day:active { transform: scale(0.95); }

.btn-reset-week {
  flex: 1;
  background: rgba(201,107,138,0.1);
  border: 1px solid rgba(201,107,138,0.25);
  color: var(--rose);
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  padding: 11px 12px;
  border-radius: 11px;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
}

.btn-reset-week:active { transform: scale(0.95); }

/* Confirm popup */
.confirm-box {
  display: none;
  margin-top: 10px;
  background: rgba(201,107,138,0.08);
  border: 1px solid rgba(201,107,138,0.3);
  border-radius: 12px;
  padding: 12px 14px;
  animation: pop-in 0.2s ease;
}

.confirm-box.show { display: block; }

.confirm-text {
  font-size: 0.78rem;
  color: var(--text-mid);
  margin-bottom: 10px;
  line-height: 1.5;
}

.confirm-text strong { color: var(--rose); }

.confirm-btns {
  display: flex;
  gap: 8px;
}

.btn-confirm-yes {
  flex: 1;
  background: rgba(201,107,138,0.2);
  border: 1px solid rgba(201,107,138,0.5);
  color: var(--rose);
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  padding: 9px;
  border-radius: 9px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
}

.btn-confirm-no {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-mid);
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  padding: 9px;
  border-radius: 9px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-confirm-yes:active, .btn-confirm-no:active { transform: scale(0.95); }

/* ========== TOAST ========== */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--cream);
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 0.78rem;
  z-index: 999;
  opacity: 0;
  transition: all 0.28s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="toast"></div>

<div class="app">

  <header>
    <span class="cat-icon">🐱</span>
    <h1>Croquettes
      <small>tracker quotidien</small>
    </h1>
  </header>

  <!-- DAY SELECTOR -->
  <div class="day-nav">
    <div class="day-nav-label">Quel jour sommes-nous ?</div>
    <div class="day-tabs" id="day-tabs"></div>
  </div>

  <!-- MAIN CARD -->
  <div class="main-card">

    <div class="card-header">
      <div class="card-day" id="card-day-label">Lundi</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-labels">
        <div>
          <div class="prog-total" id="prog-total">0 <span>g</span></div>
        </div>
        <div class="prog-target" id="prog-target-label">—</div>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="log-section">
      <div class="log-label">Ajouts du jour</div>
      <div class="log-list" id="log-list">
        <span class="log-empty">Rien encore...</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn-add" onclick="addGrams(5)">
        <span>+5</span>
        <span class="btn-g">grammes</span>
      </button>
      <button class="btn-add" onclick="addGrams(10)">
        <span>+10</span>
        <span class="btn-g">grammes</span>
      </button>
      <button class="btn-add" onclick="addGrams(20)">
        <span>+20</span>
        <span class="btn-g">grammes</span>
      </button>
      <button class="btn-undo" id="btn-undo" onclick="undoLast()" disabled>
        ↩
      </button>
    </div>
  </div>

  <!-- WEEK OVERVIEW -->
  <div class="week-card">
    <div class="week-header">
      <div class="week-title">Vue de la semaine</div>
      <div class="week-avg" id="week-avg">moy. — g/j</div>
    </div>
    <div class="week-grid" id="week-grid"></div>
  </div>

  <!-- RESET -->
  <div class="reset-card">
    <div class="reset-header">Réinitialiser</div>
    <div class="reset-row">
      <button class="btn-reset-day" onclick="resetDay()">🗑 Ce jour</button>
      <button class="btn-reset-week" onclick="askResetWeek()">⚠️ Toute la semaine</button>
    </div>
    <div class="confirm-box" id="confirm-box">
      <div class="confirm-text">
        <strong>Attention !</strong> Remettre à zéro les 7 jours de la semaine ?<br>Cette action est irréversible.
      </div>
      <div class="confirm-btns">
        <button class="btn-confirm-yes" onclick="confirmResetWeek()">Oui, tout effacer</button>
        <button class="btn-confirm-no" onclick="cancelResetWeek()">Non, annuler</button>
      </div>
    </div>
  </div>

</div><!-- /app -->

<script>
const DAYS = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
const DAYS_FULL = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi', 'Dimanche'];
const TARGET = 65; // grams target per day (visual reference)
const STORAGE_KEY = 'croquettes_week';

let currentDay = 0; // index 0-6
let weekData = loadWeek(); // { 0: [5, 10, 20, ...], 1: [...], ... }

// ========================
// STORAGE
// ========================
function loadWeek() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {};
    return JSON.parse(raw);
  } catch(e) { return {}; }
}

function saveWeek() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(weekData));
  } catch(e) {}
}

function dayTotal(d) {
  return (weekData[d] || []).reduce((a, b) => a + b, 0);
}

// ========================
// RENDER
// ========================
function renderDayTabs() {
  const container = document.getElementById('day-tabs');
  container.innerHTML = '';
  DAYS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === currentDay ? ' active' : '') + (dayTotal(i) > 0 ? ' has-data' : '');
    btn.innerHTML = `<span class="day-abbr">${d}</span><span class="day-dot"></span>`;
    btn.addEventListener('click', () => { currentDay = i; render(); });
    container.appendChild(btn);
  });
}

function renderMainCard() {
  const entries = weekData[currentDay] || [];
  const total = entries.reduce((a, b) => a + b, 0);

  // Day label
  document.getElementById('card-day-label').innerHTML = `<span>${DAYS_FULL[currentDay]}</span>`;

  // Total
  document.getElementById('prog-total').innerHTML = `${total} <span>g</span>`;

  // Target label
  const pct = Math.round((total / TARGET) * 100);
  document.getElementById('prog-target-label').innerHTML = `${pct}% de la dose<br><span style="opacity:0.4;font-size:0.62rem;">(réf. ${TARGET}g)</span>`;

  // Bar
  const bar = document.getElementById('prog-bar');
  const fillPct = Math.min(100, (total / TARGET) * 100);
  bar.style.width = fillPct + '%';
  bar.className = 'progress-bar-fill' + (total > TARGET ? ' over' : '');

  // Log pills
  const logList = document.getElementById('log-list');
  logList.innerHTML = '';
  if (entries.length === 0) {
    logList.innerHTML = '<span class="log-empty">Rien encore...</span>';
  } else {
    entries.forEach((g, i) => {
      const pill = document.createElement('span');
      pill.className = 'log-pill';
      pill.textContent = `+${g}g`;
      logList.appendChild(pill);
    });
  }

  // Undo button
  document.getElementById('btn-undo').disabled = entries.length === 0;
}

function renderWeekGrid() {
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';

  const totals = DAYS.map((_, i) => dayTotal(i));
  const maxVal = Math.max(...totals, TARGET);

  // Average (only days with data)
  const daysWithData = totals.filter(t => t > 0);
  const avg = daysWithData.length > 0
    ? Math.round(daysWithData.reduce((a,b) => a+b, 0) / daysWithData.length)
    : 0;
  document.getElementById('week-avg').textContent = avg > 0 ? `moy. ${avg}g/j` : 'moy. —';

  DAYS.forEach((label, i) => {
    const total = totals[i];
    const heightPct = total > 0 ? Math.max(8, (total / maxVal) * 100) : 0;
    const isActive = i === currentDay;

    const wrap = document.createElement('div');
    wrap.className = 'week-bar-wrap';

    wrap.innerHTML = `
      <div class="week-bar-track">
        <div class="week-bar-fill ${isActive ? 'active-day' : ''}" style="height:${heightPct}%"></div>
      </div>
      <div class="week-bar-label ${isActive ? 'active-label' : ''}">${label}</div>
    `;
    wrap.style.cursor = 'pointer';
    wrap.addEventListener('click', () => { currentDay = i; render(); });
    grid.appendChild(wrap);
  });
}

function render() {
  renderDayTabs();
  renderMainCard();
  renderWeekGrid();
}

// ========================
// ACTIONS
// ========================
function addGrams(g) {
  if (!weekData[currentDay]) weekData[currentDay] = [];
  weekData[currentDay].push(g);
  saveWeek();
  render();
  showToast(`+${g}g ajouté ! Total : ${dayTotal(currentDay)}g`);
}

function undoLast() {
  const entries = weekData[currentDay];
  if (!entries || entries.length === 0) return;
  const removed = entries.pop();
  saveWeek();
  render();
  showToast(`↩ ${removed}g annulé`);
}

function resetDay() {
  weekData[currentDay] = [];
  saveWeek();
  render();
  showToast(`${DAYS_FULL[currentDay]} remis à zéro`);
}

function askResetWeek() {
  document.getElementById('confirm-box').classList.add('show');
}

function cancelResetWeek() {
  document.getElementById('confirm-box').classList.remove('show');
}

function confirmResetWeek() {
  weekData = {};
  saveWeek();
  document.getElementById('confirm-box').classList.remove('show');
  render();
  showToast('Semaine réinitialisée');
}

// ========================
// TOAST
// ========================
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ========================
// INIT — detect today
// ========================
function getTodayIndex() {
  // JS getDay(): 0=Sun,1=Mon,...,6=Sat → we want Mon=0,...,Sun=6
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

currentDay = getTodayIndex();
render();
</script>
