<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jojo ScorePro v3</title>
    <style>
        :root { --cream: #F5F0E8; --ink: #1A1209; --warm: #E8613A; --sage: #6B8F71; --gray: #d1ccc5; }
        body { font-family: sans-serif; background: var(--cream); padding: 10px; text-align: center; color: var(--ink); margin: 0; padding-bottom: 100px; }
        
        .nav-bar { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; background: white; padding: 10px; border-radius: 25px; position: sticky; top: 10px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .nav-btn { padding: 8px 12px; border-radius: 15px; border: none; background: transparent; cursor: pointer; font-size: 0.8rem; font-weight: bold; color: var(--ink); }
        .nav-btn.active { background: var(--ink); color: white; }

        .card { background: white; margin: 15px auto; padding: 15px; border-radius: 20px; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .profile-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        
        .player-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .total-score { font-size: 1.8rem; font-weight: 900; color: var(--warm); }
        
        .yams-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 15px; }
        .yams-cell { background: #fcfaf7; padding: 8px; border-radius: 12px; border: 1px solid #eee; display: flex; flex-direction: column; }
        
        select { width: 100%; border: 1px solid var(--gray); border-radius: 8px; padding: 8px; font-size: 1rem; background: white; outline: none; }
        select.has-value { border-color: var(--sage); background: #f0f7f1; }
        select.is-crossed { border-color: var(--warm); background: #fff5f2; }

        .winner-banner { background: var(--warm); color: white; padding: 20px; border-radius: 15px; margin: 20px 0; font-weight: bold; }
        .btn-add { background: var(--ink); color: white; padding: 12px; border-radius: 12px; border: none; font-weight: bold; width: 100%; margin-top: 10px; }
        .input-main { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 80%; }
        .history-card { text-align: left; border-left: 5px solid var(--sage); margin-bottom: 10px; padding: 10px; background: white; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="showTab('game')">🎮 Jeu</button>
        <button class="nav-btn" onclick="showTab('profiles')">👤 Profils</button>
        <button class="nav-btn" onclick="showTab('history')">📜 Hist.</button>
    </div>

    <div id="tab-game" class="tab-content">
        <div style="margin-bottom:15px;">
            <button id="mode-free" class="nav-btn active" style="border:1px solid var(--ink)" onclick="setGameMode('free')">Mode Libre</button>
            <button id="mode-yams" class="nav-btn" style="border:1px solid var(--ink)" onclick="setGameMode('yams')">Mode Yams</button>
        </div>
        <div id="winner-space"></div>
        <div id="activePlayerList"></div>
        <button id="archive-btn" class="btn-add" style="background:var(--sage); max-width:450px; display:none;" onclick="archiveSession()">💾 Enregistrer & Reset</button>
    </div>

    <div id="tab-profiles" class="tab-content" style="display:none;">
        <div class="card">
            <h3>Nouveau Profil</h3>
            <input type="text" id="newProfileName" class="input-main" placeholder="Nom du joueur">
            <button class="btn-add" onclick="createProfile()">Ajouter</button>
        </div>
        <div class="card">
            <h3>Joueurs de la partie</h3>
            <div id="allProfilesList"></div>
        </div>
    </div>

    <div id="tab-history" class="tab-content" style="display:none;">
        <div id="historyList"></div>
        <button class="btn-add" style="background:var(--warm)" onclick="clearHistory()">Vider l'historique</button>
    </div>

    <script>
        let allProfiles = JSON.parse(localStorage.getItem('jojo_profiles_v3')) || [];
        let activePlayerIds = JSON.parse(localStorage.getItem('jojo_active_v3')) || [];
        let gameData = JSON.parse(localStorage.getItem('jojo_data_v3')) || {};
        let history = JSON.parse(localStorage.getItem('jojo_hist_v3')) || [];
        let currentGameMode = localStorage.getItem('jojo_mode_v3') || 'free';

        const yamsConfig = [
            { id: '1', label: 'Les 1', type: 'mult', val: 1 }, { id: '2', label: 'Les 2', type: 'mult', val: 2 },
            { id: '3', label: 'Les 3', type: 'mult', val: 3 }, { id: '4', label: 'Les 4', type: 'mult', val: 4 },
            { id: '5', label: 'Les 5', type: 'mult', val: 5 }, { id: '6', label: 'Les 6', type: 'mult', val: 6 },
            { id: 'brelan', label: 'Brelan', type: 'range', max: 30 }, { id: 'carre', label: 'Carré', type: 'range', max: 30 },
            { id: 'full', label: 'Full', type: 'fixed', score: 25 }, { id: 'psuite', label: 'P. Suite', type: 'fixed', score: 30 },
            { id: 'gsuite', label: 'G. Suite', type: 'fixed', score: 40 }, { id: 'yams', label: 'Yams', type: 'fixed', score: 50 },
            { id: 'chance', label: 'Chance', type: 'range', max: 30 }
        ];

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => { if(b.parentNode.classList.contains('nav-bar')) b.classList.remove('active'); });
            document.getElementById('tab-' + tabId).style.display = 'block';
            event.currentTarget.classList.add('active');
            if(tabId === 'history') renderHistory();
            render();
        }

        function setGameMode(mode) {
            currentGameMode = mode;
            localStorage.setItem('jojo_mode_v3', mode);
            render();
        }

        function createProfile() {
            const name = document.getElementById('newProfileName').value;
            if(!name) return;
            allProfiles.push({ id: Date.now().toString(), name });
            document.getElementById('newProfileName').value = '';
            save();
        }

        function togglePlayer(id) {
            if(activePlayerIds.includes(id)) {
                activePlayerIds = activePlayerIds.filter(i => i !== id);
            } else {
                activePlayerIds.push(id);
                if(!gameData[id]) gameData[id] = { free: 0, yams: {} };
            }
            save();
        }

        function updateYams(pId, catId, val) {
            gameData[pId].yams[catId] = val === "none" ? undefined : parseInt(val);
            save();
            checkGameEnd();
        }

        function calculateScore(pId) {
            const d = gameData[pId];
            if(!d) return 0;
            if(currentGameMode === 'free') return d.free || 0;
            let h = 0; for(let i=1; i<=6; i++) h += (d.yams[i] || 0);
            let b = h >= 63 ? 35 : 0;
            let low = 0; ['brelan','carre','full','psuite','gsuite','yams','chance'].forEach(id => low += (d.yams[id] || 0));
            return h + b + low;
        }

        function checkGameEnd() {
            if(currentGameMode !== 'yams' || activePlayerIds.length === 0) return;
            const isFinished = activePlayerIds.every(id => 
                yamsConfig.every(c => gameData[id].yams[c.id] !== undefined)
            );
            if(isFinished) {
                let winName = ""; let max = -1;
                activePlayerIds.forEach(id => {
                    let s = calculateScore(id);
                    if(s > max) { max = s; winName = allProfiles.find(p => p.id === id).name; }
                });
                document.getElementById('winner-space').innerHTML = `<div class="winner-banner">🏆 Victoire : ${winName} (${max} pts)</div>`;
                document.getElementById('archive-btn').style.display = 'block';
            }
        }

        function archiveSession() {
            if(activePlayerIds.length === 0) return;
            const summary = activePlayerIds.map(id => `${allProfiles.find(p => p.id === id).name}: ${calculateScore(id)}`).join(' | ');
            history.push({ date: new Date().toLocaleString('fr-FR'), summary, mode: currentGameMode });
            localStorage.setItem('jojo_hist_v3', JSON.stringify(history));
            
            // Reset de la partie mais garde les profils sélectionnés
            activePlayerIds.forEach(id => gameData[id] = { free: 0, yams: {} });
            document.getElementById('winner-space').innerHTML = "";
            document.getElementById('archive-btn').style.display = 'none';
            save();
            alert("Partie sauvegardée dans l'historique !");
        }

        function render() {
            document.getElementById('mode-free').className = currentGameMode === 'free' ? 'nav-btn active' : 'nav-btn';
            document.getElementById('mode-yams').className = currentGameMode === 'yams' ? 'nav-btn active' : 'nav-btn';

            document.getElementById('allProfilesList').innerHTML = allProfiles.map(p => `
                <div class="profile-item">
                    <span>${p.name}</span>
                    <input type="checkbox" style="width:20px;height:20px" ${activePlayerIds.includes(p.id)?'checked':''} onchange="togglePlayer('${p.id}')">
                </div>
            `).join('');

            document.getElementById('activePlayerList').innerHTML = activePlayerIds.map(id => {
                const p = allProfiles.find(ap => ap.id === id);
                const val = gameData[id];
                return `
                <div class="card">
                    <div class="player-header"><b>${p.name}</b><span class="total-score">${calculateScore(id)}</span></div>
                    ${currentGameMode === 'free' ? `
                        <div style="display:flex; gap:10px; margin-top:10px; justify-content:center">
                            <button class="nav-btn" style="background:#eee" onclick="gameData['${id}'].free--; save()">-1</button>
                            <input type="number" id="manual-${id}" style="width:60px" placeholder="+">
                            <button class="nav-btn" style="background:var(--sage); color:white" onclick="let v=parseInt(document.getElementById('manual-${id}').value); if(v){gameData['${id}'].free+=v; save()}">OK</button>
                        </div>
                    ` : `
                        <div class="yams-grid">
                            ${yamsConfig.map(c => {
                                const cur = val.yams[c.id];
                                return `<div class="yams-cell">
                                    <span style="font-size:0.7rem">${c.label}</span>
                                    <select class="${cur===undefined?'':(cur===0?'is-crossed':'has-value')}" onchange="updateYams('${id}','${c.id}',this.value)">
                                        <option value="none" ${cur===undefined?'selected':''}>-</option>
                                        <option value="0" ${cur===0?'selected':''}>❌</option>
                                        ${genOpts(c, cur)}
                                    </select>
                                </div>`;
                            }).join('')}
                        </div>
                    `}
                </div>`;
            }).join('');
        }

        function genOpts(c, cur) {
            let h = '';
            if(c.type === 'mult') {
                const maxDice = (parseInt(c.id) >= 1 && parseInt(c.id) <= 6) ? 5 : 6;
                for(let i=1; i<=maxDice; i++) h += `<option value="${i*c.val}" ${cur===i*c.val?'selected':''}>${i} (${i*c.val}p)</option>`;
            } else if(c.type === 'fixed') {
                h += `<option value="${c.score}" ${cur===c.score?'selected':''}>OUI (${c.score}p)</option>`;
            } else if(c.type === 'range') {
                for(let i=1; i<=c.max; i++) h += `<option value="${i}" ${cur===i?'selected':''}>${i} pts</option>`;
            }
            return h;
        }

        function renderHistory() {
            document.getElementById('historyList').innerHTML = [...history].reverse().map(h => `
                <div class="history-card"><strong>${h.date}</strong> [${h.mode}]<br>${h.summary}</div>
            `).join('');
        }

        function save() {
            localStorage.setItem('jojo_profiles_v3', JSON.stringify(allProfiles));
            localStorage.setItem('jojo_active_v3', JSON.stringify(activePlayerIds));
            localStorage.setItem('jojo_data_v3', JSON.stringify(gameData));
            render();
        }
        function clearHistory() { if(confirm("Vider l'historique ?")) { history=[]; localStorage.setItem('jojo_hist_v3','[]'); renderHistory(); } }

        render();
    </script>
</body>
</html>
