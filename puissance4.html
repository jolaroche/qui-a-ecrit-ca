<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Puissance 4">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Puissance 4 de Jojo</title>
    <style>
        :root { --cream: #F5F0E8; --ink: #1A1209; --warm: #E8613A; --sage: #6B8F71; --board: #1A1209; }
        body { font-family: sans-serif; background: var(--cream); padding: 20px; text-align: center; color: var(--ink); margin: 0; }
        
        h2 { margin-top: 10px; font-size: 1.5rem; }
        #status { margin-bottom: 20px; font-weight: bold; font-size: 1.2rem; height: 1.5rem; }
        .turn-warm { color: var(--warm); }
        .turn-sage { color: var(--sage); }

        /* Le plateau de jeu */
        .board {
            display: inline-grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 8px;
            background: var(--board);
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 95vw;
            margin: 0 auto;
        }

        .cell {
            width: 40px;
            height: 40px;
            background: var(--cream);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        /* Tailles adaptées aux mobiles */
        @media (min-width: 400px) { .cell { width: 45px; height: 45px; } }

        .cell.player1 { background: var(--warm); }
        .cell.player2 { background: var(--sage); }
        .cell.winner { transform: scale(1.1); box-shadow: 0 0 15px white; border: 2px solid white; }

        .btn-reset { 
            margin-top: 30px; background: var(--ink); color: white; border: none; 
            padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        .back-btn { display: inline-block; margin-top: 20px; text-decoration: none; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h2>🔴 Puissance 4 🟢</h2>
    <div id="status">C'est au tour du Rouge</div>

    <div class="board" id="board"></div>

    <br>
    <button class="btn-reset" onclick="resetGame()">Recommencer</button>
    <br>
    <a href="index.html" class="back-btn">← Retour au menu</a>

    <script>
        const ROWS = 6;
        const COLS = 7;
        let currentPlayer = 1; // 1 = Warm (Rouge), 2 = Sage (Vert)
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let gameActive = true;

        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');

        function createBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.onclick = () => handleMove(c);
                    boardElement.appendChild(cell);
                }
            }
        }

        function handleMove(col) {
            if (!gameActive) return;

            // Trouver la ligne la plus basse disponible
            let row = -1;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r][col] === 0) {
                    row = r;
                    break;
                }
            }

            if (row === -1) return; // Colonne pleine

            board[row][col] = currentPlayer;
            updateDisplay();

            if (checkWin(row, col)) {
                statusElement.textContent = `Le joueur ${currentPlayer === 1 ? 'Rouge' : 'Vert'} a GAGNÉ !`;
                statusElement.className = currentPlayer === 1 ? 'turn-warm' : 'turn-sage';
                gameActive = false;
                return;
            }

            if (board.flat().every(cell => cell !== 0)) {
                statusElement.textContent = "Match nul !";
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === 1 ? 2 : 1;
            statusElement.textContent = `C'est au tour du ${currentPlayer === 1 ? 'Rouge' : 'Vert'}`;
            statusElement.className = currentPlayer === 1 ? 'turn-warm' : 'turn-sage';
        }

        function updateDisplay() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const r = cell.dataset.row;
                const c = cell.dataset.col;
                cell.className = 'cell';
                if (board[r][c] === 1) cell.classList.add('player1');
                if (board[r][c] === 2) cell.classList.add('player2');
            });
        }

        function checkWin(r, c) {
            const directions = [
                [[0, 1], [0, -1]], // Horizontal
                [[1, 0], [-1, 0]], // Vertical
                [[1, 1], [-1, -1]], // Diagonale \
                [[1, -1], [-1, 1]]  // Diagonale /
            ];

            return directions.some(dir => {
                let count = 1;
                dir.forEach(([dr, dc]) => {
                    let nr = r + dr;
                    let nc = c + dc;
                    while (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === currentPlayer) {
                        count++;
                        nr += dr;
                        nc += dc;
                    }
                });
                return count >= 4;
            });
        }

        function resetGame() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            currentPlayer = 1;
            gameActive = true;
            statusElement.textContent = "C'est au tour du Rouge";
            statusElement.className = 'turn-warm';
            updateDisplay();
        }

        createBoard();
    </script>
</body>
</html>
