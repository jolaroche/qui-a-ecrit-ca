<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Compteur de points">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Compteur de points</title>
    <style>
        :root { --cream: #F5F0E8; --ink: #1A1209; --warm: #E8613A; --sage: #6B8F71; }
        body { font-family: sans-serif; background: var(--cream); padding: 20px; text-align: center; color: var(--ink); }
        
        .player-row { 
            background: white; margin: 10px auto; padding: 15px; 
            border-radius: 15px; display: flex; flex-direction: column;
            max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .player-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .player-name { font-weight: bold; font-size: 1.1rem; }
        .score { font-size: 2rem; font-weight: 900; color: var(--warm); }

        .controls { display: flex; justify-content: space-between; align-items: center; gap: 10px; border-top: 1px solid #eee; padding-top: 15px; padding-top: 10px; }
        
        /* Boutons standards */
        button { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        .btn-quick { background: #eee; color: var(--ink); padding: 10px 15px; font-size: 1.2rem; }
        
        /* Zone ajout rapide */
        .quick-add-group { display: flex; align-items: center; background: #f9f9f9; padding: 5px; border-radius: 10px; }
        .input-mini { width: 45px; border: none; background: transparent; text-align: center; font-size: 1rem; font-weight: bold; outline: none; }
        .btn-add-val { background: var(--sage); color: white; padding: 8px 12px; font-size: 0.9rem; }

        .add-zone { margin-bottom: 30px; display: flex; gap: 10px; justify-content: center; }
        .input-main { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 60%; }
        .back-btn { display: inline-block; margin-top: 30px; text-decoration: none; color: #888; }
        .reset-btn { background: none; color: #E8613A; font-size: 0.8rem; margin-top: 20px; text-decoration: underline; }
    </style>
</head>
<body>
    <h2>🔢 Compteur</h2>
    
    <div class="add-zone">
        <input type="text" id="playerName" class="input-main" placeholder="Nom du joueur">
        <button onclick="addPlayer()" style="background: var(--ink); color: white; padding: 0 15px;">+</button>
    </div>

    <div id="playerList"></div>

    <button class="reset-btn" onclick="resetAll()">Réinitialiser tout</button><br>
    <a href="index.html" class="back-btn">← Retour au menu</a>

    <script>
        let players = JSON.parse(localStorage.getItem('jojo_scores')) || [];

        function save() {
            localStorage.setItem('jojo_scores', JSON.stringify(players));
            render();
        }

        function addPlayer() {
            const name = document.getElementById('playerName').value;
            if(name) {
                players.push({ name: name, score: 0 });
                document.getElementById('playerName').value = '';
                save();
            }
        }

        function updateScore(index, val) {
            players[index].score += val;
            save();
        }

        function addCustomValue(index) {
            const input = document.getElementById(`input-${index}`);
            const val = parseInt(input.value);
            if(!isNaN(val)) {
                players[index].score += val;
                input.value = ''; // On vide le champ après ajout
                save();
            }
        }

        function resetAll() {
            if(confirm("Effacer tous les joueurs et scores ?")) {
                players = [];
                save();
            }
        }

        function render() {
            const list = document.getElementById('playerList');
            list.innerHTML = players.map((p, i) => `
                <div class="player-row">
                    <div class="player-header">
                        <span class="player-name">${p.name}</span>
                        <span class="score">${p.score}</span>
                    </div>
                    <div class="controls">
                        <div style="display: flex; gap: 5px;">
                            <button class="btn-quick" onclick="updateScore(${i}, -1)">-</button>
                            <button class="btn-quick" onclick="updateScore(${i}, 1)">+</button>
                        </div>
                        
                        <div class="quick-add-group">
                            <input type="number" id="input-${i}" class="input-mini" placeholder="0">
                            <button class="btn-add-val" onclick="addCustomValue(${i})">Ajouter</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
